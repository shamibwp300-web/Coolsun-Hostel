version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.services.frontend.loadbalancer.server.port=80
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "5000"
    volumes:
      - hostel_sqlite_data:/app/backend/instance
      - hostel_uploads:/app/uploads
    restart: always

volumes:
  hostel_sqlite_data:
    name: hostel_sqlite_data
  hostel_uploads:
    name: hostel_uploads
