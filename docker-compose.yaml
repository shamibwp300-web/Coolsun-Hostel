version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - hostel_sqlite_data:/app/instance
      - hostel_uploads:/app/uploads
    environment:
      - FLASK_ENV=production
    restart: always

volumes:
  hostel_sqlite_data:
  hostel_uploads:
