<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0720c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)" />

  <!-- Sun rays (top right) -->
  <circle cx="47" cy="17" r="6" fill="url(#sunGold)" opacity="0.95"/>
  <line x1="47" y1="8"  x2="47" y2="5"  stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="47" y1="26" x2="47" y2="29" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="17" x2="35" y2="17" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="17" x2="59" y2="17" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="11" x2="39" y2="9"  stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="23" x2="55" y2="25" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="11" x2="55" y2="9"  stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="23" x2="39" y2="25" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>

  <!-- Building body -->
  <rect x="10" y="28" width="34" height="28" rx="2" ry="2" fill="url(#buildingBlue)" />

  <!-- Rooftop triangle -->
  <polygon points="8,30 27,16 46,30" fill="#3b82f6" />
  <polygon points="10,30 27,18 44,30" fill="#60a5fa" />

  <!-- Windows row 1 -->
  <rect x="15" y="33" width="6" height="5" rx="1" fill="white" opacity="0.9"/>
  <rect x="24" y="33" width="6" height="5" rx="1" fill="white" opacity="0.9"/>
  <rect x="33" y="33" width="6" height="5" rx="1" fill="white" opacity="0.9"/>

  <!-- Windows row 2 -->
  <rect x="15" y="41" width="6" height="5" rx="1" fill="white" opacity="0.7"/>
  <rect x="33" y="41" width="6" height="5" rx="1" fill="white" opacity="0.7"/>

  <!-- Door -->
  <rect x="23" y="43" width="8" height="13" rx="1" fill="#1e3a5f" />
  <circle cx="30" cy="50" r="1" fill="#f5a623" />
</svg>
